<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech House — Repair Status</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: #0d1b2a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Animated background dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: #10203a;
    border: 1px solid #1e3456;
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }

  /* Top brand bar */
  .brand-bar {
    background: #0b1928;
    border-bottom: 1px solid #1e3456;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .brand-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-icon {
    width: 36px;
    height: 36px;
  }
  .brand-name {
    font-size: 1.35rem;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
  }
  .brand-tech { color: #ffffff; }
  .brand-house { color: #ffffff; }
  .brand-t { color: #f5882a; }
  .brand-h { color: #f5882a; }

  /* Status hero area */
  .status-hero {
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    transition: background 0.4s ease;
  }

  .status-icon-wrap {
    width: 110px;
    height: 110px;
    margin: 0 auto 20px;
    position: relative;
  }
  .status-icon-bg {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    position: relative;
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  /* Pulse ring */
  .status-icon-bg::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid;
    opacity: 0;
    animation: pulse-ring 2.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { opacity: 0.6; transform: scale(0.9); }
    100% { opacity: 0; transform: scale(1.25); }
  }

  .status-label {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
    transition: color 0.4s ease;
  }
  .status-desc {
    font-size: 0.92rem;
    color: #7a8fa8;
    line-height: 1.5;
  }

  /* Progress stepper */
  .stepper {
    padding: 0 24px 24px;
  }
  .stepper-title {
    font-size: 0.68rem;
    color: #4a6080;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }
  .steps {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 13px;
    top: 28px;
    bottom: -2px;
    width: 2px;
    background: #1e3456;
    z-index: 0;
  }
  .step.done:not(:last-child)::after { background: #f5882a; }
  .step.current:not(:last-child)::after { background: linear-gradient(to bottom, #f5882a, #1e3456); }

  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #1e3456;
    background: #0b1928;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
  }
  .step.done .step-dot {
    background: #f5882a;
    border-color: #f5882a;
    color: #fff;
  }
  .step.current .step-dot {
    background: #f5882a;
    border-color: #f5c87a;
    color: #fff;
    box-shadow: 0 0 12px rgba(245,136,42,0.5);
    animation: dot-pulse 1.8s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(245,136,42,0.4); }
    50% { box-shadow: 0 0 20px rgba(245,136,42,0.7); }
  }
  .step.future .step-dot { opacity: 0.35; }

  .step-info { padding-top: 4px; flex: 1; }
  .step-name {
    font-size: 0.87rem;
    font-weight: 700;
    color: #c8d8e8;
    line-height: 1.2;
  }
  .step.future .step-name { color: #4a6080; font-weight: 500; }
  .step.current .step-name { color: #f5c87a; }
  .step-sub {
    font-size: 0.75rem;
    color: #4a6080;
    margin-top: 2px;
  }
  .step.current .step-sub { color: #7a9aaa; }

  /* Info section */
  .info-section {
    margin: 0 24px 24px;
    background: #0b1928;
    border: 1px solid #1e3456;
    border-radius: 14px;
    overflow: hidden;
  }
  .info-row {
    display: flex;
    padding: 12px 16px;
    border-bottom: 1px solid #1e3456;
    align-items: center;
    gap: 10px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 1rem; width: 20px; text-align: center; }
  .info-label { font-size: 0.72rem; color: #4a6080; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; min-width: 80px; }
  .info-val { font-size: 0.87rem; color: #c8d8e8; font-weight: 600; flex: 1; }

  /* Footer */
  .card-footer {
    background: #0b1928;
    border-top: 1px solid #1e3456;
    padding: 16px 24px;
    text-align: center;
  }
  .footer-text { font-size: 0.75rem; color: #4a6080; line-height: 1.6; }
  .footer-brand { color: #f5882a; font-weight: 700; }

  /* Loading / Error states */
  .state-wrap {
    padding: 60px 24px;
    text-align: center;
  }
  .state-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .state-title { font-size: 1.1rem; font-weight: 700; color: #c8d8e8; margin-bottom: 8px; }
  .state-sub { font-size: 0.85rem; color: #4a6080; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #1e3456;
    border-top-color: #f5882a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status color themes */
  .theme-pending   { --sc: #f5c842; --sc-bg: rgba(245,200,66,0.12); }
  .theme-diagnosing { --sc: #a076f9; --sc-bg: rgba(160,118,249,0.12); }
  .theme-inprogress { --sc: #4f8ef7; --sc-bg: rgba(79,142,247,0.12); }
  .theme-waiting   { --sc: #f5882a; --sc-bg: rgba(245,136,42,0.12); }
  .theme-ready     { --sc: #2ec97e; --sc-bg: rgba(46,201,126,0.15); }
  .theme-completed { --sc: #2ec97e; --sc-bg: rgba(46,201,126,0.15); }

  .status-hero { background: var(--sc-bg, rgba(245,136,42,0.05)); }
  .status-icon-bg {
    background: var(--sc-bg, rgba(245,136,42,0.1));
    box-shadow: 0 0 30px var(--sc-bg, transparent);
  }
  .status-icon-bg::after { border-color: var(--sc, #f5882a); }
  .status-label { color: var(--sc, #f5882a); }

  /* Ready / Completed — special glow */
  .theme-ready .card,
  .theme-completed .card {
    border-color: rgba(46,201,126,0.3);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(46,201,126,0.08);
  }

  /* Stars for completed */
  .stars { font-size: 1.4rem; letter-spacing: 4px; margin-top: 10px; }

  /* Updated time */
  .updated-chip {
    display: inline-block;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.2);
    color: #4f8ef7;
    font-size: 0.68rem;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Refresh hint */
  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    background: none;
    border: 1px solid #1e3456;
    color: #4a6080;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .refresh-btn:hover { border-color: #f5882a; color: #f5882a; }
</style>
</head>
<body>

<div class="card" id="card">
  <!-- Loading state by default -->
  <div class="brand-bar">
    <div class="brand-logo">
      <!-- House SVG icon -->
      <svg class="brand-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6L4 18v14h12v-8h8v8h12V18L20 6z" fill="#1e3456" stroke="#2e4a70" stroke-width="1"/>
        <path d="M20 4L2 17" stroke="#f5882a" stroke-width="2" stroke-linecap="round"/>
        <path d="M20 4L38 17" stroke="#f5882a" stroke-width="2" stroke-linecap="round"/>
        <!-- Power/wifi icon on roof -->
        <circle cx="28" cy="10" r="3" fill="none" stroke="#f5882a" stroke-width="1.2"/>
        <path d="M28 10v-3" stroke="#f5882a" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Door -->
        <rect x="16" y="22" width="8" height="10" rx="1" fill="#f5882a" opacity="0.7"/>
        <!-- Windows -->
        <rect x="8" y="20" width="5" height="5" rx="0.5" fill="#4f8ef7" opacity="0.6"/>
        <rect x="27" y="20" width="5" height="5" rx="0.5" fill="#4f8ef7" opacity="0.6"/>
      </svg>
      <div class="brand-name">
        <span class="brand-tech"><span class="brand-t">T</span>ECH</span><br>
        <span class="brand-house"><span class="brand-h">H</span>OUSE</span>
      </div>
    </div>
  </div>

  <div id="mainContent">
    <div class="state-wrap">
      <div class="spinner"></div>
      <div class="state-title">Loading your repair status…</div>
      <div class="state-sub">Please wait a moment</div>
    </div>
  </div>

  <div class="card-footer">
    <div class="footer-text">
      Repair tracking by <span class="footer-brand">Tech House</span><br>
      Keep this receipt to collect your device.
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAJTsw5BH8d46v8IgJ9lFN9GXd2NgAfqVQ",
  authDomain: "techouse-d1b02.firebaseapp.com",
  projectId: "techouse-d1b02",
  storageBucket: "techouse-d1b02.firebasestorage.app",
  messagingSenderId: "1067509472890",
  appId: "1:1067509472890:web:338cd4531be1c6593b65c3"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ── Status config ──────────────────────────────────────────
const STATUS_CONFIG = {
  'Pending': {
    icon: '📋',
    label: 'PENDING',
    desc: 'We have received your item and it is now in the queue.',
    theme: 'theme-pending',
    stepIndex: 0,
  },
  'Diagnosing': {
    icon: '🔍',
    label: 'DIAGNOSING',
    desc: 'Our technician is checking your device to find the issue.',
    theme: 'theme-diagnosing',
    stepIndex: 1,
  },
  'In Progress': {
    icon: '⚙️',
    label: 'IN PROGRESS',
    desc: 'Our technicians are actively working on your item.',
    theme: 'theme-inprogress',
    stepIndex: 2,
  },
  'Waiting for Parts': {
    icon: '📦',
    label: 'WAITING FOR PARTS',
    desc: 'We are waiting for the necessary parts to arrive.',
    theme: 'theme-waiting',
    stepIndex: 3,
  },
  'Ready': {
    icon: '✅',
    label: 'READY FOR PICKUP',
    desc: 'Your item is ready! You can now come and pick it up.',
    theme: 'theme-ready',
    stepIndex: 4,
  },
  'Completed': {
    icon: '🎉',
    label: 'COMPLETED',
    desc: 'Your repair is complete. Thank you for choosing Tech House!',
    theme: 'theme-completed',
    stepIndex: 5,
  },
};

const STEPS = [
  { key: 'Pending',           icon: '📋', name: 'Pending',           sub: 'Item received & in queue' },
  { key: 'Diagnosing',        icon: '🔍', name: 'Diagnosing',        sub: 'Checking the issue' },
  { key: 'In Progress',       icon: '⚙️', name: 'In Progress',       sub: 'Repair underway' },
  { key: 'Waiting for Parts', icon: '📦', name: 'Waiting for Parts', sub: 'Parts on the way' },
  { key: 'Ready',             icon: '✅', name: 'Ready for Pickup',   sub: 'Come collect your device' },
  { key: 'Completed',         icon: '🎉', name: 'Completed',         sub: 'All done!' },
];

// ── Helpers ────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function timeSince(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just updated';
  if (mins < 60) return `Updated ${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `Updated ${hrs}h ago`;
  return `Updated ${Math.floor(hrs/24)}d ago`;
}

// ── Render ─────────────────────────────────────────────────
function render(r) {
  const cfg = STATUS_CONFIG[r.status] || STATUS_CONFIG['Pending'];
  const stepIdx = cfg.stepIndex;
  const isReady = r.status === 'Ready' || r.status === 'Completed';

  // Build stepper HTML
  const stepsHtml = STEPS.map((s, i) => {
    let cls = 'future';
    let dot = i + 1;
    if (i < stepIdx) { cls = 'done'; dot = '✓'; }
    else if (i === stepIdx) { cls = 'current'; dot = s.icon; }
    return `
      <div class="step ${cls}">
        <div class="step-dot">${dot}</div>
        <div class="step-info">
          <div class="step-name">${s.name}</div>
          <div class="step-sub">${s.sub}</div>
        </div>
      </div>
    `;
  }).join('');

  const starsHtml = isReady ? `<div class="stars">⭐⭐⭐⭐⭐</div>` : '';
  const updatedAt = r.updatedAt || r.createdAt;

  document.getElementById('mainContent').innerHTML = `
    <div class="status-hero ${cfg.theme}">
      <div class="status-icon-wrap">
        <div class="status-icon-bg">${cfg.icon}</div>
      </div>
      <div class="status-label">${cfg.label}</div>
      <div class="status-desc">${cfg.desc}</div>
      ${starsHtml}
      <div class="updated-chip">🕐 ${timeSince(updatedAt)}</div>
    </div>

    <div class="stepper">
      <div class="stepper-title">Repair Progress</div>
      <div class="steps">${stepsHtml}</div>
    </div>

    <div class="info-section">
      <div class="info-row">
        <span class="info-icon">🎫</span>
        <span class="info-label">Ticket</span>
        <span class="info-val" style="font-family:monospace;font-size:0.82rem;color:#f5c87a">#${r.id}</span>
      </div>
      <div class="info-row">
        <span class="info-icon">👤</span>
        <span class="info-label">Name</span>
        <span class="info-val">${r.customer?.name || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-icon">📱</span>
        <span class="info-label">Device</span>
        <span class="info-val">${r.device?.type || '—'}${r.device?.laptopType ? ' – ' + r.device.laptopType : ''}</span>
      </div>
      ${r.serviceType ? `
      <div class="info-row">
        <span class="info-icon">🔧</span>
        <span class="info-label">Service</span>
        <span class="info-val">${r.serviceType}</span>
      </div>` : ''}
      <div class="info-row">
        <span class="info-icon">📅</span>
        <span class="info-label">Received</span>
        <span class="info-val">${fmtDate(r.createdAt)}</span>
      </div>
    </div>

    <div style="text-align:center;padding-bottom:20px;">
      <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Status</button>
    </div>
  `;

  // Apply theme to card
  const card = document.getElementById('card');
  card.className = 'card ' + cfg.theme;
}

function showError(title, sub) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-wrap">
      <div class="state-icon">❌</div>
      <div class="state-title">${title}</div>
      <div class="state-sub">${sub}</div>
    </div>
  `;
}

function showNotFound() {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-wrap">
      <div class="state-icon">🔍</div>
      <div class="state-title">Ticket Not Found</div>
      <div class="state-sub">The ticket ID in this QR code does not match any repair in our system.<br><br>Please contact Tech House directly.</div>
    </div>
  `;
}

// ── Main ───────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const ticketId = params.get('id') || params.get('ticket');

if (!ticketId) {
  showError('No Ticket ID', 'This QR code does not contain a valid ticket ID. Please scan again or contact us.');
} else {
  // Initial fetch
  const ref = doc(db, 'repairs', ticketId);
  getDoc(ref).then(snap => {
    if (!snap.exists()) {
      showNotFound();
    } else {
      render({ id: snap.id, ...snap.data() });
      // Live updates — page auto-refreshes when status changes
      onSnapshot(ref, docSnap => {
        if (docSnap.exists()) {
          render({ id: docSnap.id, ...docSnap.data() });
        }
      });
    }
  }).catch(err => {
    console.error(err);
    showError('Connection Error', 'Could not reach our servers. Please check your internet connection and try again.');
  });
}
</script>
</body>
</html>
