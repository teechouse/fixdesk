<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Status – Tech House</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
  }

  /* ── LOGO ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #0d2137, #1a3a5c);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 10px;
    border: 2px solid rgba(255,140,0,0.4);
    box-shadow: 0 0 24px rgba(255,140,0,0.15);
  }
  .logo-text { font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; }
  .logo-text span { color: #ff8c00; }

  /* ── TICKET INFO ── */
  .ticket-info {
    text-align: center;
    margin-bottom: 28px;
  }
  .ticket-id {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .customer-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .device-info {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
  }

  /* ── STATUS CARD ── */
  .status-card {
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* backgrounds per status */
  .status-card.pending    { background: linear-gradient(145deg, #0d1b2e, #12263d); }
  .status-card.diagnosing { background: linear-gradient(145deg, #0d1b2e, #12263d); }
  .status-card.inprogress { background: linear-gradient(145deg, #0d1b2e, #12263d); }
  .status-card.waiting    { background: linear-gradient(145deg, #1a1200, #2a1f00); }
  .status-card.ready      { background: linear-gradient(145deg, #001a10, #002a18); }
  .status-card.completed  { background: linear-gradient(145deg, #001a10, #002a18); }
  .status-card.delivered  { background: linear-gradient(145deg, #1a1a2e, #16213e); }
  .status-card.cancelled  { background: linear-gradient(145deg, #1a0000, #2a0000); }
  .status-card.unknown    { background: linear-gradient(145deg, #111, #1a1a1a); }

  .status-icon { font-size: 72px; margin-bottom: 16px; display: block; }

  .status-label {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    line-height: 1.1;
  }
  .status-label.pending    { color: #fff; }
  .status-label.diagnosing { color: #fff; }
  .status-label.inprogress { color: #f5c518; }
  .status-label.waiting    { color: #ff8c00; }
  .status-label.ready      { color: #2ecc71; }
  .status-label.completed  { color: #2ecc71; }
  .status-label.delivered  { color: #aaa; }
  .status-label.cancelled  { color: #ff4444; }
  .status-label.unknown    { color: #888; }

  .status-sublabel {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.45);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .status-desc {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto;
  }

  /* ── STEPS PROGRESS ── */
  .steps-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 24px;
  }
  .steps-title {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .step:last-child { border-bottom: none; }
  .step-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .step-dot.done    { background: #2ecc71; border-color: #2ecc71; }
  .step-dot.current { background: #f5c518; border-color: #f5c518; box-shadow: 0 0 8px #f5c518; }
  .step-dot.todo    { background: transparent; border-color: rgba(255,255,255,0.2); }
  .step-text {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.5);
  }
  .step-text.done    { color: rgba(255,255,255,0.8); }
  .step-text.current { color: #fff; font-weight: 700; }

  /* ── FOOTER ── */
  .footer-info {
    width: 100%; max-width: 420px;
    text-align: center;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.25);
    line-height: 1.6;
  }
  .footer-info a { color: rgba(255,140,0,0.6); text-decoration: none; }

  /* ── LOADING / ERROR ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.4);
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #ff8c00;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,60,60,0.1);
    border: 1px solid rgba(255,60,60,0.3);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }
  .error-box .err-icon { font-size: 40px; margin-bottom: 12px; }
  .error-box p { color: rgba(255,255,255,0.6); font-size: 0.9rem; line-height: 1.5; }

  /* ── STARS ── */
  .stars { font-size: 1.4rem; margin-top: 12px; letter-spacing: 2px; }

  /* ── LAST UPDATED ── */
  .last-updated {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.2);
    margin-top: 16px;
    text-align: center;
  }

  /* glow pulse for ready */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(46,204,113,0.2); }
    50%       { box-shadow: 0 0 40px rgba(46,204,113,0.5); }
  }
  .status-card.ready { animation: glow-pulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- LOGO -->
<div class="logo-wrap">
  <div class="logo-icon">🏠</div>
  <div class="logo-text">TECH <span>HOUSE</span></div>
</div>

<!-- DYNAMIC CONTENT -->
<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading your repair status…</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAJTsw5BH8d46v8IgJ9lFN9GXd2NgAfqVQ",
  authDomain: "techouse-d1b02.firebaseapp.com",
  projectId: "techouse-d1b02",
  storageBucket: "techouse-d1b02.firebasestorage.app",
  messagingSenderId: "1067509472890",
  appId: "1:1067509472890:web:338cd4531be1c6593b65c3"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── STATUS CONFIG ─────────────────────────────────────────────────────────────
const STATUS_CONFIG = {
  'Pending': {
    key: 'pending',
    icon: '📋',
    label: 'PENDING',
    sub: 'In Queue',
    desc: 'We have received your device and it is now in the queue. We will start working on it shortly.',
    step: 0
  },
  'Diagnosing': {
    key: 'diagnosing',
    icon: '🔍',
    label: 'DIAGNOSING',
    sub: 'Under Inspection',
    desc: 'Our technician is currently checking your device to identify the issue.',
    step: 1
  },
  'In Progress': {
    key: 'inprogress',
    icon: '🔧',
    label: 'IN PROGRESS',
    sub: 'Being Repaired',
    desc: 'Our technicians are actively working on your device.',
    step: 2
  },
  'Waiting for Parts': {
    key: 'waiting',
    icon: '📦',
    label: 'WAITING FOR PARTS',
    sub: 'Parts on the Way',
    desc: 'We are waiting for the necessary parts to arrive. We will continue the repair as soon as they are here.',
    step: 2
  },
  'Ready': {
    key: 'ready',
    icon: '✅',
    label: 'READY FOR PICKUP',
    sub: 'Come Collect It!',
    desc: 'Your device is ready! You can come to Tech House and pick it up anytime.',
    step: 3
  },
  'Completed': {
    key: 'completed',
    icon: '🌟',
    label: 'COMPLETED',
    sub: 'Repair Done',
    desc: 'The repair is complete. Thank you for choosing Tech House — we appreciate your trust!',
    step: 3
  },
  'Delivered': {
    key: 'delivered',
    icon: '🏠',
    label: 'DELIVERED',
    sub: 'Device Returned',
    desc: 'Your device has been returned to you. We hope everything is working perfectly!',
    step: 4
  },
  'Cancelled': {
    key: 'cancelled',
    icon: '❌',
    label: 'CANCELLED',
    sub: 'Ticket Cancelled',
    desc: 'This repair ticket has been cancelled. Please contact Tech House for more information.',
    step: -1
  }
};

const STEPS = [
  { label: 'Received', key: 'pending' },
  { label: 'Diagnosing', key: 'diagnosing' },
  { label: 'In Repair', key: 'inprogress' },
  { label: 'Ready / Completed', key: 'ready' },
  { label: 'Delivered', key: 'delivered' },
];

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function render(r) {
  const cfg = STATUS_CONFIG[r.status] || {
    key: 'unknown', icon: '❓', label: r.status||'UNKNOWN',
    sub: '', desc: 'Please contact Tech House for more information.', step: 0
  };

  const currentStep = cfg.step;
  const stepsHtml = cfg.key === 'cancelled' ? '' : `
    <div class="steps-wrap">
      <div class="steps-title">Repair Progress</div>
      ${STEPS.map((s, i) => {
        let state = 'todo';
        if (i < currentStep) state = 'done';
        else if (i === currentStep) state = 'current';
        return `<div class="step">
          <div class="step-dot ${state}"></div>
          <div class="step-text ${state}">${s.label}</div>
        </div>`;
      }).join('')}
    </div>`;

  const stars = (cfg.key === 'completed' || cfg.key === 'delivered')
    ? `<div class="stars">⭐⭐⭐⭐⭐</div><div style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:6px;">Thank you for choosing Tech House!</div>`
    : '';

  document.getElementById('root').innerHTML = `
    <div class="ticket-info">
      <div class="ticket-id">Ticket #${r.id}</div>
      <div class="customer-name">${r.customer?.name || ''}</div>
      <div class="device-info">${r.device?.type || ''}${r.device?.laptopType ? ' • ' + r.device.laptopType : ''} &nbsp;|&nbsp; ${r.serviceType || '—'}</div>
    </div>

    <div class="status-card ${cfg.key}">
      <span class="status-icon">${cfg.icon}</span>
      <div class="status-label ${cfg.key}">${cfg.label}</div>
      <div class="status-sublabel">${cfg.sub}</div>
      <div class="status-desc">${cfg.desc}</div>
      ${stars}
    </div>

    ${stepsHtml}

    <div class="last-updated">Received: ${fmtDate(r.createdAt)}</div>

    <div class="footer-info" style="margin-top:20px;">
      <div>Tech House Repair Center</div>
      <div style="margin-top:4px;">This page updates automatically when your repair status changes.</div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="error-box">
      <div class="err-icon">🔍</div>
      <p>${msg}</p>
    </div>
    <div class="footer-info" style="margin-top:24px;">
      <div>Tech House Repair Center</div>
      <div style="margin-top:4px;">If you think this is a mistake, please contact us.</div>
    </div>
  `;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const ticketId = params.get('id');

if (!ticketId) {
  showError('No ticket ID found in this link. Please scan the QR code on your receipt again.');
} else {
  // Real-time listener — updates automatically when status changes
  onSnapshot(doc(db, 'repairs', ticketId), (snap) => {
    if (!snap.exists()) {
      showError(`Ticket <strong>${ticketId}</strong> was not found. Please contact Tech House.`);
    } else {
      render({ id: snap.id, ...snap.data() });
    }
  }, (err) => {
    console.error(err);
    showError('Could not load repair status. Please check your internet connection and try again.');
  });
}
</script>
</body>
</html>
